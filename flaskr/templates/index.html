<!-- flaskr/templates/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Notes</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
      }
      .note {
        border: 1px solid #ccc;
        padding: 15px;
        margin-bottom: 10px;
      }
      .note h2 {
        margin: 0 0 10px 0;
      }
      .note p {
        margin: 0;
      }
      .note small {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>My Notes</h1>
    {% for note in notes %}
    <div class="note" data-id="{{ note.id }}">
      <div class="view-mode">
        <h2 class="note-title">{{ note.title }}</h2>
        <p class="note-content">{{ note.content }}</p>
        <small>Created at: {{ note.created_at }}</small>
        <br />
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </div>
      <div class="edit-mode" style="display: none; margin-top: 10px">
        <input class="edit-title" type="text" value="{{ note.title }}" />
        <br />
        <textarea class="edit-content">{{ note.content }}</textarea>
        <br />
        <button class="save-btn">Save</button>
        <button class="cancel-btn">Cancel</button>
      </div>
    </div>
    {% else %}
    <p>No notes found.</p>
    {% endfor %}
    <form method="POST" action="/add_note">
      <input type="text" name="title" placeholder="Title" required />
      <br />
      <textarea name="content" placeholder="Content" required></textarea>
      <br />
      <button type="submit">Add Note</button>
    </form>
    <script>
      function handleError(resp) {
        return resp.json().then((j) => {
          throw new Error(j.error || resp.statusText);
        });
      }

      document.addEventListener("click", function (e) {
        // Delete
        if (e.target.classList.contains("delete-btn")) {
          const el = e.target.closest(".note");
          const id = el.dataset.id;
          if (!confirm("Delete this note?")) return;
          fetch(`/notes/${id}`, { method: "DELETE" })
            .then((resp) => {
              if (!resp.ok) return handleError(resp);
              el.remove();
            })
            .catch((err) => alert("Error deleting note: " + err.message));
        }

        // Edit (show edit form)
        if (e.target.classList.contains("edit-btn")) {
          const el = e.target.closest(".note");
          el.querySelector(".view-mode").style.display = "none";
          el.querySelector(".edit-mode").style.display = "";
        }

        // Cancel edit
        if (e.target.classList.contains("cancel-btn")) {
          const el = e.target.closest(".note");
          el.querySelector(".edit-mode").style.display = "none";
          el.querySelector(".view-mode").style.display = "";
        }

        // Save edit
        if (e.target.classList.contains("save-btn")) {
          const el = e.target.closest(".note");
          const id = el.dataset.id;
          const title = el.querySelector(".edit-title").value.trim();
          const content = el.querySelector(".edit-content").value.trim();
          if (!title || !content) {
            alert("Title and content required");
            return;
          }
          fetch(`/notes/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, content }),
          })
            .then((resp) => {
              if (!resp.ok) return handleError(resp);
              return resp.json();
            })
            .then((data) => {
              el.querySelector(".note-title").textContent = data.title;
              el.querySelector(".note-content").textContent = data.content;
              el.querySelector(".edit-mode").style.display = "none";
              el.querySelector(".view-mode").style.display = "";
            })
            .catch((err) => alert("Error updating note: " + err.message));
        }
      });
    </script>
  </body>
</html>
